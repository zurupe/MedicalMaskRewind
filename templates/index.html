{% extends "base.html" %}

{% block title %}Vista en Vivo · Bioseguridad{% endblock %}
{% block page_title %}Monitoreo en Tiempo Real{% endblock %}

{% block content %}
<div class="card" style="padding: 0; overflow: hidden; background: #000; border: none;">
    <div class="video-container">
        <img id="video_feed" src="{{ url_for('video_feed') }}" alt="Video Stream">
        <div class="video-overlay-status" id="video-overlay">Cargando stream...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.addEventListener('appStateUpdated', (e) => {
        const data = e.detail;
        
        // Overlay de la cámara
        const overlay = document.getElementById('video-overlay');
        if (data.video_ready) {
            overlay.style.display = 'none';
        } else {
            overlay.style.display = 'block';
            overlay.textContent = 'Esperando cámara...';
        }
    });
</script>
{% endblock %}
